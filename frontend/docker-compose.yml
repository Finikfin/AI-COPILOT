services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-frontend-web}:${TAG:-latest}
    restart: always
    networks: [shop-network]

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [shop-network]

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --url http://caddy:80 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks: [shop-network]
    depends_on:
      - caddy

networks:
  shop-network:
    external: true

volumes:
  caddy_data:
  caddy_config:
