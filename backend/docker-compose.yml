services:
  api:
    image: ${DOCKER_IMAGE:-solution-api}:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile

    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/dbname
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-60}
      - YANDEX_API_KEY=${YANDEX_API_KEY:-}
      - YANDEX_IAM_TOKEN=${YANDEX_IAM_TOKEN:-}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID:-}
      - YANDEX_MODEL_URI=${YANDEX_MODEL_URI:-}
      - YANDEX_MODEL_NAME=${YANDEX_MODEL_NAME:-yandexgpt-lite/latest}
      - YANDEX_API_URL=${YANDEX_API_URL:-https://llm.api.cloud.yandex.net/foundationModels/v1/completion}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shop-network
      - default

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dbname
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  shop-network:
    external: true
