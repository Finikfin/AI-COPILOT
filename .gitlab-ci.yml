stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_IMAGE: "python:3.12-slim"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE"


.python-base:
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r solution/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/solution

lint:
  stage: lint
  extends: .python-base
  script:
    - pip install ruff
    - ruff check solution

test:
  stage: test
  extends: .python-base
  script:
    - pytest solution/tests

build:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://localhost:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - until docker info; do sleep 1; done
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --pull -t $DOCKER_IMAGE:latest -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA ./solution
    - docker push $DOCKER_IMAGE:latest
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - master



deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - '[[ -z "$SSH_PRIVATE_KEY" ]] && echo "SSH_PRIVATE_KEY is empty" && exit 1'
    - '[[ -z "$SERVER_IP" ]] && echo "SERVER_IP is empty" && exit 1'
    - '[[ -z "$SERVER_USER" ]] && echo "SERVER_USER is empty" && exit 1'
    - 'echo "$SSH_PRIVATE_KEY" | tr -d "\r" | ssh-add - > /dev/null'
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - '[[ ! -z "$SSH_KNOWN_HOSTS" ]] && echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts'

  script:
    - |
      ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
        cd ~/backend &&
        git pull &&
        echo 'DOCKER_IMAGE=$DOCKER_IMAGE' > .env &&
        echo 'TAG=$CI_COMMIT_SHORT_SHA' >> .env &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull &&
        docker compose up -d
      "


  only:
    - main
    - master
  environment:
    name: production