stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_IMAGE: "python:3.12-slim"
  DOCKER_IMAGE: "registry.gitlab.com/$CI_PROJECT_PATH"

.python-base:
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r solution/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/solution

lint:
  stage: lint
  extends: .python-base
  script:
    - pip install ruff
    - ruff check solution

test:
  stage: test
  extends: .python-base
  script:
    - pytest solution/tests

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --pull -t $DOCKER_IMAGE:latest -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA ./solution
    - docker push $DOCKER_IMAGE:latest
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - master

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "
        cd /path/to/project &&
        echo 'DOCKER_IMAGE=$DOCKER_IMAGE' > .env &&
        echo 'TAG=$CI_COMMIT_SHORT_SHA' >> .env &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull &&
        docker compose up -d
      "
  only:
    - main
    - master
  environment:
    name: production